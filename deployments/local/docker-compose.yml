version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: merger
      POSTGRES_PASSWORD: merger
      POSTGRES_DB: merger
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  postgres-data:
