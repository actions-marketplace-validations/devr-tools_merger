name: homebrew-validation.yml

on:
  pull_request:
    branches:
      - develop
      - master
      - main

permissions:
  contents: read

jobs:
  formula-validation:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Clone Homebrew tap
        shell: bash
        env:
          TAP_REPOSITORY: devr-tools/homebrew-tap
        run: |
          set -euo pipefail
          git clone --depth 1 "https://github.com/${TAP_REPOSITORY}.git" "$RUNNER_TEMP/homebrew-tap"

      - name: Patch tap formula for current checkout
        shell: bash
        run: |
          set -euo pipefail

          version="$(awk -F'"' '/^var Number = / { print $2; exit }' internal/version/version.go)"
          archive_path="$RUNNER_TEMP/merger-src.tar.gz"
          tap_dir="$RUNNER_TEMP/homebrew-tap"
          formula_path="$RUNNER_TEMP/homebrew-tap/Formula/merger.rb"
          git archive --format=tar.gz --output "$archive_path" HEAD
          sha256="$(shasum -a 256 "$archive_path" | awk '{print $1}')"

          if [ -z "$version" ]; then
            echo "failed to extract merger version from internal/version/version.go"
            exit 1
          fi

          mkdir -p "$tap_dir/Formula"
          cat > "$formula_path" <<EOF
          class Merger < Formula
            desc "Mutation control plane CLI for AI-native engineering"
            homepage "https://github.com/devr-tools/merger"
            url "file://$archive_path"
            sha256 "$sha256"
            version "$version"
            license "Apache-2.0"
            depends_on "go" => :build

            def install
              ldflags = "-s -w -X github.com/devr-tools/merger/internal/version.Number=#{version}"
              system "go", "build", *std_go_args(output: bin/"merger", ldflags: ldflags), "./cmd/merger"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/merger version")
            end
          end
          EOF

          git -C "$tap_dir" config user.name "github-actions[bot]"
          git -C "$tap_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$tap_dir" add Formula/merger.rb
          git -C "$tap_dir" commit -m "test: patch merger formula for validation"

      - name: Tap current formula checkout
        shell: bash
        run: |
          set -euo pipefail
          brew tap devr-tools/tap "$RUNNER_TEMP/homebrew-tap"

      - name: Build formula from source
        shell: bash
        run: |
          set -euo pipefail
          HOMEBREW_NO_AUTO_UPDATE=1 brew install --build-from-source devr-tools/tap/merger

      - name: Run formula test
        shell: bash
        run: |
          set -euo pipefail
          brew test devr-tools/tap/merger
